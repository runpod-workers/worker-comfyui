events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Pass WebSocket upgrade headers correctly
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8188;
        server_name _;

        # Health-check endpoint: the loading page polls this to detect when
        # ComfyUI is ready. Returns the raw upstream response (including 502
        # when ComfyUI is not yet up) so the JS can gate on status < 500.
        location = /ready {
            proxy_pass            http://127.0.0.1:8180/;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
        }

        # Everything else: proxy to ComfyUI (port 8180).
        # While ComfyUI is still starting up, any upstream connection failure
        # (502/503/504) is caught and the loading page is served instead.
        location / {
            proxy_pass          http://127.0.0.1:8180;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection $connection_upgrade;
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;

            proxy_intercept_errors on;
            error_page 502 503 504 = @loading;
        }

        location @loading {
            root /usr/share/nginx/html/loading-page;
            rewrite ^ /index.html break;
        }
    }
}
